name: Build and Release (Windows + macOS)

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pyaga8 pywin32

      - name: Run test suite
        run: |
          python -m pytest tests/ -q --tb=short

      - name: Build standalone executable with PyInstaller
        run: |
          pyinstaller "Gas Flow Calc V6.6 (Windows).spec" --clean

      - name: Create source ZIP for in-app updates
        shell: bash
        run: |
          git archive --format=zip --output=Gas_Flow_Calc_V6.6.0_source.zip HEAD

      - name: Calculate SHA256 checksums
        shell: bash
        run: |
          for f in dist/*.exe; do
            if [ -f "$f" ]; then
              echo "SHA256_WIN_EXE=$(sha256sum "$f" | cut -d' ' -f1)" >> $GITHUB_ENV
              break
            fi
          done
          if [ -f "Gas_Flow_Calc_V6.6.0_source.zip" ]; then
            echo "SHA256_WIN_ZIP=$(sha256sum Gas_Flow_Calc_V6.6.0_source.zip | cut -d' ' -f1)" >> $GITHUB_ENV
          fi

      - name: Upload to GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=""
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          elif [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME=$(git describe --tags --abbrev=0 2>/dev/null || echo "v6.6.0")
          fi

          EXE_FILE=""
          for f in dist/*.exe; do
            [ -f "$f" ] && EXE_FILE="$f" && break
          done
          ZIP_FILE="Gas_Flow_Calc_V6.6.0_source.zip"

          ASSETS=""
          [ -n "$EXE_FILE" ] && ASSETS="$ASSETS \"$EXE_FILE\""
          [ -f "$ZIP_FILE" ] && ASSETS="$ASSETS $ZIP_FILE"

          if [ -n "$ASSETS" ]; then
            # Upload each asset separately to handle spaces in filenames
            if [ -n "$EXE_FILE" ]; then
              gh release upload "$TAG_NAME" "$EXE_FILE" --clobber
            fi
            if [ -f "$ZIP_FILE" ]; then
              gh release upload "$TAG_NAME" "$ZIP_FILE" --clobber
            fi
          fi

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pyaga8

      - name: Run test suite
        run: |
          python -m pytest tests/ -q --tb=short

      - name: Build standalone app bundle with PyInstaller
        run: |
          pyinstaller "Gas Flow Calc V6.6 (macOS).spec" --clean

      - name: Create DMG
        run: |
          APP_PATH=$(find dist -name "*.app" -type d 2>/dev/null | head -n 1)
          if [ -d "$APP_PATH" ]; then
            hdiutil create -volname "Gas Flow Calc V6.6" \
              -srcfolder "$APP_PATH" \
              -ov -format UDZO "Gas_Flow_Calc_V6.6.0.dmg"
          fi

      - name: Calculate SHA256 checksum
        run: |
          if [ -f "Gas_Flow_Calc_V6.6.0.dmg" ]; then
            echo "SHA256_MAC_DMG=$(shasum -a 256 Gas_Flow_Calc_V6.6.0.dmg | cut -d' ' -f1)" >> $GITHUB_ENV
          fi

      - name: Upload DMG to GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=""
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          elif [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME=$(git describe --tags --abbrev=0 2>/dev/null || echo "v6.6.0")
          fi

          if [ -f "Gas_Flow_Calc_V6.6.0.dmg" ]; then
            gh release upload "$TAG_NAME" Gas_Flow_Calc_V6.6.0.dmg --clobber
          fi
