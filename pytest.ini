[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    ui: marks tests that require Tkinter display (deselect with '-m "not ui"')
    coolprop: marks tests that require CoolProp
filterwarnings =
    ignore::DeprecationWarning